# Apache2 konfiguracija za FOOZOS Raspored
# Kopirajte u /etc/apache2/sites-available/raspored.conf
# Zatim: a2ensite raspored && a2enmod proxy proxy_http ssl headers && systemctl reload apache2

<VirtualHost *:80>
    ServerName raspored.example.com

    # Preusmjeri sav HTTP promet na HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName raspored.example.com

    # SSL certifikat (Let's Encrypt ili vlastiti)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/raspored.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/raspored.example.com/privkey.pem

    # Proxy prema Gunicorn-u
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Proslijedi stvarnu IP adresu klijenta
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"

    # Sigurnosni headeri
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    # Logovi
    ErrorLog ${APACHE_LOG_DIR}/raspored-error.log
    CustomLog ${APACHE_LOG_DIR}/raspored-access.log combined
</VirtualHost>
