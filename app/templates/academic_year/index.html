{% extends "base.html" %}
{% block title %}Akademske godine - FOOZOS Raspored{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-calendar-range"></i> Akademske godine</h4>
    <a href="{{ url_for('academic_year.create') }}" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-circle"></i> Dodaj
    </a>
</div>

<div class="card">
    <div class="card-body p-0">
        {% if years %}
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Naziv</th>
                        <th class="text-end" style="width:120px">Akcije</th>
                    </tr>
                </thead>
                <tbody>
                    {% for year in years %}
                    <tr>
                        <td class="fw-medium">{{ year.name }}</td>
                        <td class="text-end">
                            <a href="{{ url_for('academic_year.edit', id=year.id) }}" class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form method="POST" action="{{ url_for('academic_year.delete', id=year.id) }}" class="d-inline" data-confirm="Obrisati akademsku godinu?">
                                <button type="submit" class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div class="text-center text-muted py-5">
            <i class="bi bi-calendar-range" style="font-size:3rem"></i>
            <p class="mt-2">Nema akademskih godina. Dodajte prvu.</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
