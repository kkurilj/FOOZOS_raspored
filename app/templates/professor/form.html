{% extends "base.html" %}
{% block title %}{{ 'Uredi' if professor else 'Dodaj' }} profesora - FOOZOS Raspored{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold text-dark">
        <i class="bi bi-people"></i> {{ 'Uredi' if professor else 'Dodaj' }} profesora
    </h4>
    <a href="{{ url_for('professor.index') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Natrag
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" style="max-width: 500px;">
            {{ csrf_input }}
            <div class="mb-3">
                <label for="title_select" class="form-label">Titula</label>
                <select class="form-select" id="title_select" onchange="toggleCustomTitle()">
                    <option value="">(bez titule)</option>
                    {% for t in titles %}
                    {% if t %}
                    <option value="{{ t }}" {{ 'selected' if professor and professor.title == t }}>{{ t }}</option>
                    {% endif %}
                    {% endfor %}
                    <option value="__custom__" {{ 'selected' if professor and professor.title and professor.title not in titles }}>-- Drugo (upišite) --</option>
                </select>
                <input type="text" class="form-control mt-2" id="custom_title" placeholder="Upišite titulu"
                       value="{{ professor.title if professor and professor.title not in titles else '' }}"
                       style="display:{% if professor and professor.title and professor.title not in titles %}block{% else %}none{% endif %}">
                <input type="hidden" id="title" name="title"
                       value="{{ professor.title if professor else '' }}">
            </div>
            <div class="mb-3">
                <label for="first_name" class="form-label">Ime</label>
                <input type="text" class="form-control" id="first_name" name="first_name"
                       value="{{ professor.first_name if professor else '' }}" required>
            </div>
            <div class="mb-3">
                <label for="last_name" class="form-label">Prezime</label>
                <input type="text" class="form-control" id="last_name" name="last_name"
                       value="{{ professor.last_name if professor else '' }}" required>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> {{ 'Spremi' if professor else 'Dodaj' }}
            </button>
        </form>
    </div>
</div>

<script>
function toggleCustomTitle() {
    var sel = document.getElementById('title_select');
    var custom = document.getElementById('custom_title');
    var hidden = document.getElementById('title');
    if (sel.value === '__custom__') {
        custom.style.display = 'block';
        custom.focus();
        hidden.value = custom.value;
    } else {
        custom.style.display = 'none';
        hidden.value = sel.value;
    }
}
document.getElementById('custom_title').addEventListener('input', function() {
    document.getElementById('title').value = this.value;
});
document.getElementById('title_select').addEventListener('change', toggleCustomTitle);
// Set initial hidden value
(function() {
    var sel = document.getElementById('title_select');
    var hidden = document.getElementById('title');
    if (sel.value !== '__custom__') {
        hidden.value = sel.value;
    }
})();
</script>
{% endblock %}
