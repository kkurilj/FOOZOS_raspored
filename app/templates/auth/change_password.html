{% extends "base.html" %}
{% block title %}Promjena lozinke - FOOZOS Raspored{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-header text-white text-center" style="background:var(--primary)">
                <h5 class="mb-0"><i class="bi bi-shield-lock"></i> Obavezna promjena lozinke</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-warning py-2">
                    <i class="bi bi-exclamation-triangle"></i>
                    Morate promijeniti zadanu lozinku prije nastavka rada.
                </div>
                <form method="POST">
                    {{ csrf_input }}
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Nova lozinka</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required minlength="10" autofocus>
                        <div class="form-text">Minimalno 10 znakova. Mora biti različita od trenutne.</div>
                    </div>
                    <div class="mb-3">
                        <label for="new_password_confirm" class="form-label">Ponovi novu lozinku</label>
                        <input type="password" class="form-control" id="new_password_confirm" name="new_password_confirm" required minlength="10">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg"></i> Promijeni lozinku
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
