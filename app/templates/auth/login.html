{% extends "base.html" %}
{% block title %}Prijava - FOOZOS Raspored{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-header text-white text-center" style="background:var(--primary)">
                <h5 class="mb-0"><i class="bi bi-lock"></i> Prijava</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Korisničko ime</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Lozinka</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Prijavi se
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
