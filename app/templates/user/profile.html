{% extends "base.html" %}
{% block title %}Profil - FOOZOS Raspored{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold text-dark">
        <i class="bi bi-person-circle"></i> Moj profil
    </h4>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" style="max-width: 500px;">
            {{ csrf_input }}
            <div class="mb-3">
                <label class="form-label">Korisničko ime</label>
                <input type="text" class="form-control" value="{{ user.username }}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">Uloga</label>
                <input type="text" class="form-control" value="{{ 'Super Admin' if user.role == 'super_admin' else 'Admin' }}" disabled>
            </div>
            <div class="mb-3">
                <label for="first_name" class="form-label">Ime</label>
                <input type="text" class="form-control" id="first_name" name="first_name"
                       value="{{ user.first_name }}" required>
            </div>
            <div class="mb-3">
                <label for="last_name" class="form-label">Prezime</label>
                <input type="text" class="form-control" id="last_name" name="last_name"
                       value="{{ user.last_name }}" required>
            </div>
            <hr>
            <p class="text-muted small">Ostavite prazno ako ne želite mijenjati lozinku.</p>
            <div class="mb-3">
                <label for="current_password" class="form-label">Trenutna lozinka</label>
                <input type="password" class="form-control" id="current_password" name="current_password">
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">Nova lozinka</label>
                <input type="password" class="form-control" id="new_password" name="new_password" minlength="10">
                <div class="form-text">Minimalno 10 znakova.</div>
            </div>
            <div class="mb-3">
                <label for="new_password_confirm" class="form-label">Ponovi novu lozinku</label>
                <input type="password" class="form-control" id="new_password_confirm" name="new_password_confirm" minlength="10">
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Spremi
            </button>
        </form>
    </div>
</div>
{% endblock %}
