{% extends "base.html" %}
{% block title %}Učionice - FOOZOS Raspored{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-building"></i> Učionice</h4>
    <a href="{{ url_for('classroom.create') }}" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-circle"></i> Dodaj
    </a>
</div>

<div class="card">
    <div class="card-body p-0">
        {% if classrooms %}
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Naziv / Broj</th>
                        <th class="text-end" style="width:120px">Akcije</th>
                    </tr>
                </thead>
                <tbody>
                    {% for room in classrooms %}
                    <tr>
                        <td class="fw-medium">{{ room.name }}</td>
                        <td class="text-end">
                            <a href="{{ url_for('classroom.edit', id=room.id) }}" class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form method="POST" action="{{ url_for('classroom.delete', id=room.id) }}" class="d-inline" data-confirm="Obrisati učionicu?">
                                <button type="submit" class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div class="text-center text-muted py-5">
            <i class="bi bi-building" style="font-size:3rem"></i>
            <p class="mt-2">Nema učionica. Dodajte prvu.</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
